<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none">
<title>SZM — Sprachzentrum Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:#f0f4fa;color:#1a2236;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}
input,select,textarea{border:1.5px solid #d1dae8;border-radius:8px;padding:8px 12px;outline:none;background:#fff;color:#1a2236;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#3a7bd5}
textarea{resize:vertical}

/* LAYOUT */
#app-shell{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#fff;border-right:1.5px solid #e4ebf5;display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* SIDEBAR */
.brand{padding:16px;border-bottom:1.5px solid #e4ebf5;display:flex;align-items:center;gap:10px}
.brand-logo{width:36px;height:36px;background:linear-gradient(135deg,#1a50a0,#3a7bd5);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.brand-name{font-size:15px;font-weight:600;color:#0d2d5e}
.nav-section{padding:12px 12px 4px;font-size:10px;color:#a0aab8;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;font-size:13px;color:#5a6478;cursor:pointer;border-radius:8px;margin:1px 6px;transition:all .15s;border:1.5px solid transparent;position:relative}
.nav-item:hover{background:#f0f4fa;color:#1a2236}
.nav-item.active{background:#e8f0fb;color:#1a50a0;font-weight:500;border-color:#c5d8f5}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:#e24b4a;color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.nav-lop{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;color:#5a6478;cursor:pointer;border-radius:8px;margin:1px 6px}
.nav-lop:hover{background:#f0f4fa}
.nav-lop.active{color:#1a50a0;font-weight:500}
.lop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* alert dot cho lớp có cảnh báo kiểm tra */
.nav-lop .alert-dot{width:7px;height:7px;border-radius:50%;background:#e24b4a;margin-left:auto;flex-shrink:0;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.sidebar-footer{margin-top:auto;padding:12px;border-top:1.5px solid #e4ebf5}
.user-card{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:#1a2236}
.role-pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;display:inline-block;margin-top:2px}
.r-admin{background:#e8f0fb;color:#1a50a0}
.r-giaovien{background:#e1f5ee;color:#0f6e56}
.r-quanly{background:#faeeda;color:#7d4e0a}
.r-phuhuynh{background:#fbeaf0;color:#8a2040}
.logout-btn{font-size:11px;color:#8a96a8;background:none;border:none;padding:2px 0;margin-top:2px;display:block;text-align:left}
.logout-btn:hover{color:#e24b4a}

/* TOPBAR */
#topbar{padding:12px 20px;background:#fff;border-bottom:1.5px solid #e4ebf5;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.page-title{font-size:16px;font-weight:600;color:#0d2d5e;flex:1;min-width:120px}

/* ALERT BANNER */
#alert-banner{display:none;background:#fff3cd;border-bottom:2px solid #f0ad4e;padding:8px 20px;font-size:13px;color:#7d4e0a;display:flex;gap:8px;align-items:center}
.alert-blink{animation:pulse 1s infinite;display:inline-block;width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0}

/* BTN */
.btn{padding:7px 14px;border-radius:8px;border:1.5px solid #d1dae8;background:#fff;color:#1a2236;font-weight:500;transition:all .15s;font-size:13px}
.btn:hover{border-color:#3a7bd5;color:#1a50a0}
.btn-primary{background:#1a50a0;border-color:#1a50a0;color:#fff}
.btn-primary:hover{background:#153f80}
.btn-danger{background:#fff;border-color:#f5c4b3;color:#993c1d}
.btn-danger:hover{background:#fef0ee;border-color:#e24b4a}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:#0f6e56;border-color:#0f6e56;color:#fff}

/* TABS */
.tab-bar{display:flex;gap:2px;padding:0 20px;background:#fff;border-bottom:1.5px solid #e4ebf5;overflow-x:auto}
.tab{padding:10px 14px;font-size:13px;color:#5a6478;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;white-space:nowrap;font-weight:500}
.tab:hover{color:#1a2236}
.tab.active{color:#1a50a0;border-bottom-color:#1a50a0}

/* CONTENT */
#content{flex:1;overflow:auto;padding:20px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:12px;padding:16px;border:1.5px solid #e4ebf5}
.stat-label{font-size:11px;color:#8a96a8;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;color:#0d2d5e;line-height:1}
.stat-sub{font-size:11px;color:#8a96a8;margin-top:4px}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kanban-col{background:#f5f8fd;border-radius:12px;border:1.5px solid #e4ebf5;overflow:hidden}
.col-header{padding:11px 14px;background:#fff;border-bottom:1.5px solid #e4ebf5;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600}
.col-body{padding:8px;min-height:100px}
.hv-card{background:#fff;border-radius:8px;border:1.5px solid #e4ebf5;padding:11px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.hv-card:hover{border-color:#3a7bd5;box-shadow:0 2px 8px rgba(58,123,213,.1)}
.hv-card.warn{border-left:3px solid #ba7517}
.hv-card.danger{border-left:3px solid #e24b4a}
.hv-name{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.hv-meta{font-size:11px;color:#8a96a8;display:flex;align-items:center;gap:4px;margin-top:3px}
.progress{height:3px;background:#e4ebf5;border-radius:2px;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* TABLE */
.table-wrap{background:#fff;border-radius:12px;border:1.5px solid #e4ebf5;overflow:hidden}
.table-toolbar{padding:12px 16px;border-bottom:1.5px solid #e4ebf5;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#8a96a8;text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid #e4ebf5;background:#f8fafd;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f4fa;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafd}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}

/* BADGES */
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.b-ok{background:#e1f5ee;color:#0f6e56}
.b-phep{background:#e8f0fb;color:#1a50a0}
.b-tre{background:#faeeda;color:#7d4e0a}
.b-vang{background:#fef0ee;color:#993c1d}
.b-warn1{background:#faeeda;color:#7d4e0a}
.b-warn2{background:#fef0ee;color:#993c1d}
.b-dong{background:#e1f5ee;color:#0f6e56}
.b-chua{background:#fef0ee;color:#993c1d}
.b-baoluu{background:#f0ebff;color:#5a30b5}
.b-nghi{background:#f5f5f5;color:#5a6478}

/* LOP CARD */
.lop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.lop-card{background:#fff;border-radius:12px;border:1.5px solid #e4ebf5;padding:16px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.lop-card:hover{border-color:#3a7bd5;box-shadow:0 4px 14px rgba(58,123,213,.1)}
.lop-card.has-alert{border-color:#e24b4a;box-shadow:0 0 0 3px rgba(226,75,74,.1)}
.lop-title{font-size:15px;font-weight:600;color:#0d2d5e;margin-bottom:4px}
.lop-cap{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:10px}
.lop-progress-wrap{margin:10px 0 6px}
.lop-progress-label{display:flex;justify-content:space-between;font-size:11px;color:#8a96a8;margin-bottom:4px}
.lop-progress{height:6px;background:#e4ebf5;border-radius:3px}
.lop-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.lop-dates{font-size:11px;color:#8a96a8;margin-top:6px}
.kt-alert{margin-top:10px;padding:8px 10px;border-radius:7px;font-size:12px;font-weight:500}
.kt-alert.giua{background:#fff3cd;color:#7d4e0a;border:1px solid #f0ad4e}
.kt-alert.cuoi{background:#fef0ee;color:#993c1d;border:1px solid #f5c4b3}
.lop-actions{position:absolute;top:12px;right:12px;display:flex;gap:5px}
.so-hv{font-size:12px;color:#5a6478;margin-top:6px}

/* CHECKBOX STYLE */
.cb{width:16px;height:16px;cursor:pointer;accent-color:#1a50a0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,50,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(10,20,50,.25)}
.modal h3{font-size:15px;font-weight:600;color:#0d2d5e;margin-bottom:18px;padding-bottom:12px;border-bottom:1.5px solid #e4ebf5}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:12px;font-weight:600;color:#5a6478;margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1.5px solid #e4ebf5}
.hint{background:#f5f8fd;border-radius:8px;padding:10px 12px;font-size:12px;color:#5a6478;margin-top:6px}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast-item{background:#1a2236;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .2s ease;max-width:300px}
.toast-item.success{background:#0f6e56}
.toast-item.error{background:#993c1d}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOGIN */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#e8f1fb,#d0e4ff);display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:24px;padding:44px 36px;width:400px;max-width:94vw;border:1.5px solid #c5daff;text-align:center}
.login-logo{width:68px;height:68px;background:linear-gradient(135deg,#1a50a0,#3a7bd5);border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;margin:0 auto 18px}
.login-title{font-size:21px;font-weight:700;color:#0d2d5e;margin-bottom:5px}
.login-sub{font-size:13px;color:#8a96a8;margin-bottom:26px}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #d1dae8;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;color:#1a2236;cursor:pointer;width:100%;justify-content:center;transition:all .15s}
.btn-google:hover{border-color:#3a7bd5;box-shadow:0 4px 12px rgba(58,123,213,.12)}
.login-error{margin-top:12px;font-size:13px;color:#993c1d;background:#fef0ee;border-radius:8px;padding:9px 12px;display:none;text-align:left}
.login-note{margin-top:16px;font-size:11px;color:#a0aab8}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:#8a96a8}

/* RESPONSIVE */
@media(max-width:800px){
  #sidebar{width:54px}
  .brand-name,.nav-item span,.nav-section,.nav-lop,.user-name,.role-pill,.logout-btn{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .kanban,.lop-grid{grid-template-columns:1fr}
  .form-grid2,.form-grid3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">SZ</div>
    <h1 class="login-title">Sprachzentrum Manager</h1>
    <p class="login-sub">Quản lý trung tâm tiếng Đức</p>
    <button class="btn-google" id="login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

    <div class="login-error" id="login-error"></div>
    <p class="login-note">Chỉ email được cấp phép mới có thể truy cập</p>
  </div>
</div>

<!-- APP -->
<div id="app-shell" style="display:none">
  <div id="sidebar">
    <div class="brand">
      <div class="brand-logo">SZ</div>
      <div><div class="brand-name">SZM</div></div>
    </div>
    <div class="nav-section">Menu</div>

</div>

<script>
const GCI = '39863848508-e8iffhhvlv2h7l06395vunsp2i3ksnh8.apps.googleusercontent.com';
const API = 'https://script.google.com/macros/s/AKfycbw7w_WgTjrskEXN6ubY1wLEFAoJjvOBuobmkymTaEd2kAYq4Nf7mEJt-g2KevZvVcI9/exec';

const CAP_DO_COLORS = {'A1':'#e8f0fb','A2':'#e1f5ee','B1.1':'#faeeda','B1.2':'#fef0ee','B2':'#f0ebff'};
const CAP_DO_TEXT   = {'A1':'#1a50a0','A2':'#0f6e56','B1.1':'#7d4e0a','B1.2':'#993c1d','B2':'#5a30b5'};
const LOP_COLORS    = ['#378add','#1d9e75','#ba7517','#d4537e','#7f77dd','#0f6e56'];
const LOAI_DIEM     = {bai_tap:'Bài tập',giua_ky:'Giữa kỳ',cuoi_ky:'Cuối kỳ'};
const TRANG_THAI_DD = {co_mat:'Có mặt',vang_phep:'Nghỉ có phép',vang_khong_phep:'Nghỉ không phép',di_tre:"Đi trễ >15'"};
const TRANG_THAI_HV = {danghoc:'Đang học',nghi:'Đã nghỉ',baoluu:'Bảo lưu'};
const ROLES_VI      = {admin:'Admin',giaovien:'Giáo viên',quanly:'Quản lý',phuhuynh:'Phụ huynh'};

let USER=null, LOPS=[], LOP_DATA=[], CURRENT_PAGE='dashboard', CURRENT_LOP='', CURRENT_TAB='', MODAL_CB=null;

// ── AUTH ──
function startGoogleLogin(){
  google.accounts.oauth2.initTokenClient({client_id:GCI,scope:'profile email',callback:onToken}).requestAccessToken();
}
async function onToken(t){
  showLoginError('Đang xác thực...');
  try{
    const res=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+t.access_token}});
    const info=await res.json();
    if(!info.email){showLoginError('Không lấy được email');return;}
    const r=await call({action:'whoami',email:info.email});
    if(!r.ok){showLoginError(r.error||'Email không được phép');return;}
    USER={email:info.email,role:r.data.role,hoTen:r.data.hoTen||info.name,lopPhuTrach:r.data.lopPhuTrach||''};
    startApp();
  }catch(e){showLoginError('Lỗi: '+e.message);}
}
function showLoginError(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
function logout(){USER=null;document.getElementById('app-shell').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('login-error').style.display='none';}

// ── API ──
async function call(params){
  const p={email:USER?.email||'',...params};
  const qs=Object.entries(p).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(typeof v==='object'?JSON.stringify(v):String(v))).join('&');
  const r=await fetch(API+'?'+qs);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// ── BOOT ──
async function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  const ini=USER.hoTen.split(' ').slice(-2).map(w=>w[0]).join('').toUpperCase();
  const av=document.getElementById('user-avatar');
  av.textContent=ini;av.style.background='#e8f0fb';av.style.color='#1a50a0';
  document.getElementById('user-display-name').textContent=USER.hoTen;
  const rp=document.getElementById('user-role-pill');
  rp.textContent=ROLES_VI[USER.role]||USER.role;rp.className='role-pill r-'+USER.role;
  applyRoleNav();
  await loadLops();
  navTo('dashboard');
}

function applyRoleNav(){
  const r=USER.role;
  if(r==='phuhuynh'){['nav-lophoc','nav-hocvien','nav-chuyencan','nav-bangdiem','nav-taikhoan','lop-section','lop-nav'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});}
  if(r==='giaovien') document.getElementById('nav-taikhoan').style.display='none';
  if(r==='quanly'){document.getElementById('nav-taikhoan').style.display='none';document.getElementById('nav-chuyencan').style.display='none';}
}

async function loadLops(){
  const r=await call({action:'getLopList'});
  if(!r.ok) return;
  LOP_DATA=r.data;
  LOPS=LOP_DATA.map(l=>l.tenLop);
  renderLopNav();
  renderFilterLop();
  // Cảnh báo kiểm tra
  const alerts=LOP_DATA.filter(l=>l.canhBaoGiuaKy||l.canhBaoCuoiKy);
  if(alerts.length>0){
    document.getElementById('badge-lop').style.display='';
    const msgs=alerts.map(l=>{
      if(l.canhBaoCuoiKy) return `${l.tenLop}: Cuối kỳ còn ${l.soNgayConCuoiKy} ngày!`;
      return `${l.tenLop}: Giữa kỳ còn ${l.soNgayConGiuaKy} ngày!`;
    });
    const banner=document.getElementById('alert-banner');
    document.getElementById('alert-text').textContent='⚠ Sắp đến kỳ kiểm tra: '+msgs.join(' · ');
    banner.style.display='flex';
  }
}

function renderLopNav(){
  const nav=document.getElementById('lop-nav');
  if(!nav) return;
  nav.innerHTML=LOP_DATA.map((l,i)=>{
    const hasAlert=l.canhBaoGiuaKy||l.canhBaoCuoiKy;
    return `<div class="nav-lop" data-lop="${l.tenLop}" onclick="filterByLop('${l.tenLop}')">
      <span class="lop-dot" style="background:${LOP_COLORS[i%LOP_COLORS.length]}"></span>
      ${l.tenLop}
      ${hasAlert?'<span class="alert-dot"></span>':''}
    </div>`;
  }).join('');
}

function renderFilterLop(){
  const sel=document.getElementById('filter-lop');
  sel.innerHTML='<option value="">Tất cả lớp</option>'+LOPS.map(l=>`<option value="${l}">${l}</option>`).join('');
  sel.onchange=()=>{CURRENT_LOP=sel.value;renderCurrentPage();};
}

function filterByLop(lop){
  CURRENT_LOP=lop;
  document.getElementById('filter-lop').value=lop;
  document.querySelectorAll('.nav-lop').forEach(el=>el.classList.toggle('active',el.dataset.lop===lop));
  if(['hocvien','chuyencan','bangdiem'].includes(CURRENT_PAGE)) renderCurrentPage();
  else navTo('hocvien');
}

// ── NAV ──
function navTo(page){
  CURRENT_PAGE=page;CURRENT_TAB='';
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const titles={dashboard:'Dashboard',lophoc:'Lớp học',hocvien:'Học viên',chuyencan:'Chuyên cần',bangdiem:'Bảng điểm',thongbao:'Thông báo',taikhoan:'Tài khoản'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.getElementById('filter-lop').style.display=['hocvien','chuyencan','bangdiem'].includes(page)?'':'none';
  document.getElementById('filter-ngay').style.display=page==='chuyencan'?'':'none';
  document.getElementById('btn-add').style.display=['lophoc','hocvien','bangdiem','thongbao','taikhoan'].includes(page)&&USER.role!=='phuhuynh'?'':'none';
  document.getElementById('tab-bar').style.display=page==='hocvien'?'':'none';
  if(page==='chuyencan'&&!document.getElementById('filter-ngay').value)
    document.getElementById('filter-ngay').value=new Date().toISOString().slice(0,10);
  document.getElementById('filter-ngay').onchange=renderCurrentPage;
  renderCurrentPage();
}

function renderCurrentPage(){
  switch(CURRENT_PAGE){
    case 'dashboard': renderDashboard();break;
    case 'lophoc':   renderLopHoc();break;
    case 'hocvien':  renderHocVien();break;
    case 'chuyencan':renderChuyenCan();break;
    case 'bangdiem': renderBangDiem();break;
    case 'thongbao': renderThongBao();break;
    case 'taikhoan': renderTaiKhoan();break;
  }
}

// ── LOP HOC ──
async function renderLopHoc(){
  setContent('<div class="empty">Đang tải...</div>');
  const r=await call({action:'getLopList'});
  LOP_DATA=r.ok?r.data:[];
  document.getElementById('btn-add').onclick=()=>openModalLop(null);
  if(LOP_DATA.length===0){setContent('<div class="empty"><p>Chưa có lớp nào. Thêm lớp đầu tiên!</p></div>');return;}
  setContent(`<div class="lop-grid">${LOP_DATA.map(l=>lopCard(l)).join('')}</div>`);
}

function lopCard(l){
  const total=dateDiff(l.ngayBatDau,l.ngayKetThuc);
  const passed=dateDiff(l.ngayBatDau,todayStr());
  const pct=total>0?Math.max(0,Math.min(100,Math.round(passed/total*100))):0;
  const canEdit=['admin'].includes(USER.role);
  return `<div class="lop-card ${l.canhBaoGiuaKy||l.canhBaoCuoiKy?'has-alert':''}">
    ${canEdit?`<div class="lop-actions">
      <button class="btn btn-sm" onclick="event.stopPropagation();openModalLop('${l.lopId}')">Sửa</button>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteLop('${l.lopId}')">Xóa</button>
    </div>`:''}
    <div class="lop-title">${l.tenLop}</div>
    <span class="lop-cap" style="background:${CAP_DO_COLORS[l.capDo]||'#f0f4fa'};color:${CAP_DO_TEXT[l.capDo]||'#5a6478'}">${l.capDo||'—'}</span>
    <div style="font-size:11px;color:#8a96a8">GV: ${l.giaoVienEmail||'—'}</div>
    ${l.ngayBatDau&&l.ngayKetThuc?`
    <div class="lop-progress-wrap">
      <div class="lop-progress-label"><span>Tiến độ</span><span>${pct}%</span></div>
      <div class="lop-progress"><div class="lop-progress-fill" style="width:${pct}%;background:${pct>=100?'#0f6e56':'#3a7bd5'}"></div></div>
    </div>
    <div class="lop-dates">${fmtDate(l.ngayBatDau)} → ${fmtDate(l.ngayKetThuc)}</div>
    ${l.ngayGiuaKy?`<div style="font-size:11px;color:#8a96a8;margin-top:4px">Giữa kỳ: ${fmtDate(l.ngayGiuaKy)}</div>`:''}
    `:''}
    ${l.canhBaoGiuaKy?`<div class="kt-alert giua">⚠ Giữa kỳ còn ${l.soNgayConGiuaKy} ngày!</div>`:''}
    ${l.canhBaoCuoiKy?`<div class="kt-alert cuoi">🔴 Cuối kỳ còn ${l.soNgayConCuoiKy} ngày!</div>`:''}
    <div class="so-hv" style="margin-top:8px;cursor:pointer" onclick="filterByLop('${l.tenLop}')">Xem học viên →</div>
  </div>`;
}

async function openModalLop(lopId){
  let l=null;
  if(lopId) l=LOP_DATA.find(x=>x.lopId===lopId)||null;
  const tvList=await call({action:'getTaiKhoanList'});
  const gvList=tvList.ok?tvList.data.filter(t=>t.role==='giaovien'):[];
  showModal(l?'Sửa lớp':'Thêm lớp mới',`
    <div class="form-grid2">
      <div class="form-row"><label>Tên lớp *</label><input id="f-tenLop" value="${l?.tenLop||''}"></div>
      <div class="form-row"><label>Cấp độ</label>
        <select id="f-capDo">
          ${['A1','A2','B1.1','B1.2','B2'].map(c=>`<option value="${c}" ${l?.capDo===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label>Ngày bắt đầu</label><input type="date" id="f-ngayBD" value="${l?.ngayBatDau||''}"></div>
      <div class="form-row"><label>Ngày kết thúc (dự kiến)</label><input type="date" id="f-ngayKT" value="${l?.ngayKetThuc||''}"></div>
    </div>
    <div class="form-row"><label>Giáo viên phụ trách</label>
      <select id="f-gv">
        <option value="">— Chọn giáo viên —</option>
        ${gvList.map(gv=>`<option value="${gv.email}" ${l?.giaoVienEmail===gv.email?'selected':''}>${gv.hoTen} (${gv.email})</option>`).join('')}
      </select>
    </div>
    <div class="form-row"><label>Ghi chú</label><textarea id="f-ghiChu" rows="2">${l?.ghiChu||''}</textarea></div>
    <div class="hint">Ngày kiểm tra giữa kỳ sẽ được tính tự động = 50% thời gian lớp học. Cảnh báo sẽ hiện khi còn ≤ 7 ngày.</div>
  `,async()=>{
    const body={tenLop:document.getElementById('f-tenLop').value.trim(),capDo:document.getElementById('f-capDo').value,ngayBatDau:document.getElementById('f-ngayBD').value,ngayKetThuc:document.getElementById('f-ngayKT').value,giaoVienEmail:document.getElementById('f-gv').value,ghiChu:document.getElementById('f-ghiChu').value.trim()};
    if(!body.tenLop){toast('Nhập tên lớp','error');return;}
    if(l){body.lopId=lopId;await call({action:'updateLop',...body});}
    else await call({action:'addLop',...body});
    closeModal();toast(l?'Đã cập nhật lớp':'Đã thêm lớp','success');
    await loadLops();renderLopHoc();
  });
}
async function deleteLop(lopId){
  if(!confirm('Xóa lớp này? Dữ liệu học viên không bị xóa.')) return;
  await call({action:'deleteLop',lopId});
  toast('Đã xóa lớp','success');await loadLops();renderLopHoc();
}

// ── HOC VIEN ──
async function renderHocVien(){
  // Tab bar
  const tabBar=document.getElementById('tab-bar');
  tabBar.style.display='';
  if(!CURRENT_TAB) CURRENT_TAB='kanban';
  tabBar.innerHTML=`
    <div class="tab ${CURRENT_TAB==='kanban'?'active':''}" onclick="switchTab('kanban')">Kanban</div>
    <div class="tab ${CURRENT_TAB==='list'?'active':''}" onclick="switchTab('list')">Danh sách</div>
  `;
  document.getElementById('btn-add').onclick=()=>openModalHV(null);
  if(CURRENT_TAB==='list') await renderHVList();
  else await renderHVKanban();
}

function switchTab(tab){CURRENT_TAB=tab;renderHocVien();}

async function renderHVKanban(){
  setContent('<div class="empty">Đang tải...</div>');
  const [hvR,cbR]=await Promise.all([call({action:'getHocVienByLop',lop:CURRENT_LOP}),CURRENT_LOP?call({action:'getThongKeCanhBao',lop:CURRENT_LOP}):{ok:false}]);
  const hvList=hvR.ok?hvR.data.filter(hv=>hv.trangThai==='danghoc'||!hv.trangThai):[];
  const cbMap={};if(cbR.ok)cbR.data.forEach(c=>cbMap[c.studentId]=c);
  const tot=hvList.filter(hv=>!cbMap[hv.studentId]||cbMap[hv.studentId].diemViPham<3);
  const theo=hvList.filter(hv=>cbMap[hv.studentId]?.loaiCanhBao==='canh_bao_1');
  const crit=hvList.filter(hv=>cbMap[hv.studentId]?.loaiCanhBao==='canh_bao_2');
  setContent(`<div class="kanban">
    ${kCol('Học tốt',tot.length,'b-ok',tot.map(hv=>hvCard(hv,cbMap[hv.studentId],'ok')).join(''))}
    ${kCol('Cần theo dõi',theo.length,'b-warn1',theo.map(hv=>hvCard(hv,cbMap[hv.studentId],'warn')).join(''))}
    ${kCol('Cần liên hệ ngay',crit.length,'b-warn2',crit.map(hv=>hvCard(hv,cbMap[hv.studentId],'danger')).join(''))}
  </div>`);
}

function kCol(title,count,badge,html){
  return `<div class="kanban-col"><div class="col-header"><span>${title}</span><span class="badge ${badge}">${count}</span></div><div class="col-body">${html||'<div style="padding:20px;text-align:center;font-size:12px;color:#a0aab8">Không có</div>'}</div></div>`;
}
function hvCard(hv,cb,status){
  const dp=cb?cb.diemViPham:0;
  const pct=Math.max(0,Math.min(100,Math.round((1-dp/10)*100)));
  const clr=status==='ok'?'#1d9e75':status==='warn'?'#ba7517':'#e24b4a';
  return `<div class="hv-card ${status!=='ok'?status:''}" onclick="openModalHV('${hv.studentId}')">
    <div class="hv-name"><div class="avatar" style="width:24px;height:24px;font-size:10px;background:#e8f0fb;color:#1a50a0">${ini(hv.hoTen)}</div>${hv.hoTen}${cb?.emailDaGui?'<span class="badge b-warn2" style="margin-left:auto;font-size:9px">Email PH</span>':''}</div>
    <div class="hv-meta">${hv.lop}</div>
    ${dp>0?`<div class="hv-meta" style="color:#ba7517">⚠ ${dp} điểm VP</div>`:''}
    ${hv.soDienThoaiPH?`<div class="hv-meta">PH: ${hv.soDienThoaiPH}</div>`:''}
    <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${clr}"></div></div>
  </div>`;
}

async function saveDD(){
  const ngay=document.getElementById('filter-ngay').value;
  const records=[];
  document.querySelectorAll('.dd-sel').forEach(sel=>{
    const sid=sel.dataset.sid;
    const note=document.querySelector(`.dd-note[data-sid="${sid}"]`)?.value||'';
    records.push({studentId:sid,ngay,trangThai:sel.value,ghiChu:note});
  });
  const r=await call({action:'saveDiemDanh',records});
  if(r.ok){toast('Đã lưu điểm danh','success');renderChuyenCan();}
  else toast('Lỗi lưu','error');
}

    <div class="hint">
      <strong>Admin</strong>: toàn quyền &nbsp;|&nbsp;
      <strong>Giáo viên</strong>: thấy lớp được assign trong Lớp học &nbsp;|&nbsp;
      <strong>Quản lý</strong>: xem báo cáo, gửi thông báo &nbsp;|&nbsp;
      <strong>Phụ huynh</strong>: xem học viên mình quản lý
    </div>
  `,async()=>{
    const body={email:(document.getElementById('f-email').value||email||'').trim().toLowerCase(),hoTen:document.getElementById('f-hoTen').value.trim(),role:document.getElementById('f-role').value};
    if(!body.email||!body.hoTen){toast('Nhập đầy đủ','error');return;}
    const r=await call({action:isEdit?'updateTaiKhoan':'addTaiKhoan',...body});
    if(!r.ok){toast(r.error||'Lỗi','error');return;}
    closeModal();toast(isEdit?'Đã cập nhật':'Đã thêm','success');renderTaiKhoan();
  });
}
async function deleteTK(email){
  if(!confirm('Xóa tài khoản '+email+'?')) return;
  await call({action:'deleteTaiKhoan',email});
  toast('Đã xóa','success');renderTaiKhoan();
}

// ── HELPERS ──
function ini(name){return(name||'').split(' ').slice(-2).map(w=>w[0]||'').join('').toUpperCase()||'?';}
function fmtDate(s){if(!s)return '—';try{return new Date(s).toLocaleDateString('vi-VN');}catch{return s;}}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dateDiff(a,b){if(!a||!b)return 0;return Math.round((new Date(b)-new Date(a))/(86400000));}
function ddClass(tt){return{co_mat:'b-ok',vang_phep:'b-phep',vang_khong_phep:'b-vang',di_tre:'b-tre'}[tt]||'';}
function loaiClass(l){return{bai_tap:'b-phep',giua_ky:'b-warn1',cuoi_ky:'b-vang'}[l]||'';}
function ttClass(t){return{danghoc:'b-ok',nghi:'b-nghi',baoluu:'b-baoluu'}[t]||'';}
function setContent(h){document.getElementById('content').innerHTML=h;}

function showModal(title,body,onOk){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').style.display='flex';
  MODAL_CB=onOk;
}
function closeModal(){document.getElementById('modal').style.display='none';MODAL_CB=null;}
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast-item'+(type?' '+type:'');el.textContent=msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

window.addEventListener('load',()=>{
  document.getElementById('login-btn').addEventListener('click',startGoogleLogin);
  document.getElementById('logout-btn').addEventListener('click',logout);
  document.getElementById('modal-cancel').addEventListener('click',closeModal);
  document.getElementById('modal-ok').addEventListener('click',()=>{if(MODAL_CB)MODAL_CB();});
  document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>{el.addEventListener('click',()=>navTo(el.dataset.page));});
});
</script>
