<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none">
<meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none">
<title>SZM — Sprachzentrum Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:#f0f4fa;color:#1a2236;font-size:14px;line-height:1.5}
button,input,select,textarea{font-family:inherit;font-size:14px}
button{cursor:pointer}
input,select,textarea{border:1.5px solid #d1dae8;border-radius:8px;padding:8px 12px;outline:none;background:#fff;color:#1a2236;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:#3a7bd5}
textarea{resize:vertical}

/* LAYOUT */
#app-shell{display:flex;height:100vh;overflow:hidden}
#sidebar{width:230px;background:linear-gradient(180deg,#0d2d5e 0%,#1a50a0 100%);border-right:none;display:flex;flex-direction:column;flex-shrink:0;box-shadow:4px 0 20px rgba(10,30,80,.18)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0f4fa}

/* SIDEBAR */
.brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px}
.brand-logo{width:38px;height:38px;background:linear-gradient(135deg,#fff3,#fff1);border:2px solid rgba(255,255,255,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.brand-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);line-height:1.3}
.nav-section{padding:14px 14px 4px;font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;border-radius:10px;margin:1px 8px;transition:all .18s;border:1px solid transparent;position:relative}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600;border-color:rgba(255,255,255,.25);box-shadow:0 2px 10px rgba(0,0,0,.15)}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:#e24b4a;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;box-shadow:0 1px 4px rgba(226,75,74,.5)}
.nav-lop{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,.65);cursor:pointer;border-radius:8px;margin:1px 8px;transition:all .15s}
.nav-lop:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-lop.active{color:#fff;font-weight:500;background:rgba(255,255,255,.12)}
.lop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* alert dot cho lớp có cảnh báo kiểm tra */
.nav-lop .alert-dot{width:7px;height:7px;border-radius:50%;background:#fbbf24;margin-left:auto;flex-shrink:0;animation:pulse 1.5s infinite;box-shadow:0 0 6px #fbbf24}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.1)}
.user-card{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;transition:background .15s}
.user-card:hover{background:rgba(255,255,255,.08)}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.role-pill{font-size:9px;padding:1px 7px;border-radius:10px;font-weight:600;display:inline-block;margin-top:2px}
.r-admin{background:rgba(255,255,255,.2);color:#fff}
.r-giaovien{background:rgba(16,185,129,.25);color:#6ee7b7}
.r-trogiang{background:rgba(20,184,166,.25);color:#5eead4}
.r-quanly{background:rgba(251,191,36,.2);color:#fde68a}
.r-phuhuynh{background:rgba(251,113,133,.2);color:#fda4af}
.logout-btn{font-size:11px;color:rgba(255,255,255,.45);background:none;border:none;padding:2px 0;margin-top:2px;display:block;text-align:left;cursor:pointer;transition:color .15s}
.logout-btn:hover{color:#f87171}

/* TOPBAR */
#topbar{padding:14px 24px;background:#fff;border-bottom:none;box-shadow:0 1px 0 #e4ebf5,0 4px 12px rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:10}
.page-title{font-size:17px;font-weight:700;color:#0d2d5e;flex:1;min-width:120px}

/* ALERT BANNER */
#alert-banner{display:none;background:linear-gradient(90deg,#fff7e0,#fff3cd);border-bottom:none;border-top:3px solid #f0ad4e;padding:8px 24px;font-size:13px;color:#7d4e0a;display:flex;gap:8px;align-items:center;box-shadow:0 2px 8px rgba(240,173,78,.15)}
.alert-blink{animation:pulse 1s infinite;display:inline-block;width:8px;height:8px;border-radius:50%;background:#e24b4a;flex-shrink:0}

/* BTN */
.btn{padding:7px 16px;border-radius:9px;border:1.5px solid #d1dae8;background:#fff;color:#1a2236;font-weight:500;transition:all .15s;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn:hover{border-color:#3a7bd5;color:#1a50a0;box-shadow:0 2px 8px rgba(58,123,213,.12);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#1a50a0,#2563d4);border-color:#1a50a0;color:#fff;box-shadow:0 2px 8px rgba(26,80,160,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#153f80,#1a50a0);box-shadow:0 4px 14px rgba(26,80,160,.4);color:#fff}
.btn-danger{background:#fff;border-color:#f5c4b3;color:#993c1d;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.btn-danger:hover{background:#fef0ee;border-color:#e24b4a;box-shadow:0 2px 8px rgba(226,75,74,.15)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-success{background:linear-gradient(135deg,#0f6e56,#059669);border-color:#0f6e56;color:#fff;box-shadow:0 2px 8px rgba(15,110,86,.3)}

/* TABS */
.tab-bar{display:flex;gap:2px;padding:0 24px;background:#fff;border-bottom:1px solid #e4ebf5;overflow-x:auto}
.tab{padding:11px 16px;font-size:13px;color:#5a6478;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;font-weight:500;transition:all .15s}
.tab:hover{color:#1a2236}
.tab.active{color:#1a50a0;border-bottom-color:#1a50a0;font-weight:600}

/* CONTENT */
#content{flex:1;overflow:auto;padding:24px}
/* Scrollbar mảnh, không có nút mũi tên lên/xuống (nút "roll" gây khó hiểu trên Windows/Chrome) */
#content::-webkit-scrollbar{width:9px;height:9px}
#content::-webkit-scrollbar-button{display:none;width:0;height:0}
#content::-webkit-scrollbar-track{background:transparent}
#content::-webkit-scrollbar-thumb{background:#c7d2e0;border-radius:20px;border:2px solid transparent;background-clip:padding-box}
#content::-webkit-scrollbar-thumb:hover{background:#a8b8cc;background-clip:padding-box}
#content{scrollbar-width:thin;scrollbar-color:#c7d2e0 transparent}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:16px;padding:18px 20px;border:none;box-shadow:0 2px 0 #e4ebf5,0 4px 16px rgba(0,0,0,.06);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a50a0,#3a7bd5)}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.1)}
.stat-label{font-size:11px;color:#8a96a8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;color:#0d2d5e;line-height:1}
.stat-sub{font-size:11px;color:#8a96a8;margin-top:5px}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kanban-col{background:#f5f8fd;border-radius:14px;border:1px solid #e4ebf5;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.col-header{padding:12px 16px;background:#fff;border-bottom:1px solid #e4ebf5;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600}
.col-body{padding:8px;min-height:100px}
.hv-card{background:#fff;border-radius:10px;border:1px solid #e4ebf5;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hv-card:hover{border-color:#3a7bd5;box-shadow:0 4px 14px rgba(58,123,213,.14);transform:translateY(-1px)}
.hv-card.warn{border-left:3px solid #ba7517}
.hv-card.danger{border-left:3px solid #e24b4a}
.hv-name{font-size:13px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.hv-meta{font-size:11px;color:#8a96a8;display:flex;align-items:center;gap:4px;margin-top:3px}
.progress{height:4px;background:#e4ebf5;border-radius:2px;margin-top:8px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* TABLE */
.table-wrap{background:#fff;border-radius:16px;border:none;overflow:hidden;box-shadow:0 2px 0 #e4ebf5,0 4px 16px rgba(0,0,0,.06)}
.table-toolbar{padding:14px 18px;border-bottom:1px solid #f0f4fa;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#8a96a8;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #f0f4fa;background:linear-gradient(180deg,#fafbfd,#f5f8fc);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #f7f9fc;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}

/* BADGES */
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-ok{background:#dcfce7;color:#166534}
.b-phep{background:#dbeafe;color:#1e40af}
.b-tre{background:#fef9c3;color:#854d0e}
.b-vang{background:#fee2e2;color:#991b1b}
.b-warn1{background:#fef3c7;color:#92400e}
.b-warn2{background:#fee2e2;color:#991b1b}
.b-dong{background:#dcfce7;color:#166534}
.b-chua{background:#fee2e2;color:#991b1b}
.b-baoluu{background:#ede9fe;color:#5b21b6}
.b-nghi{background:#f1f5f9;color:#475569}

/* LOP CARD */
.lop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.lop-card{background:#fff;border-radius:16px;border:none;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;box-shadow:0 2px 0 #e4ebf5,0 4px 16px rgba(0,0,0,.06)}
.lop-card::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#1a50a0,#3a7bd5);opacity:.6;transition:opacity .2s}
.lop-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.12);transform:translateY(-3px)}
.lop-card:hover::after{opacity:1}
.lop-card.has-alert{box-shadow:0 4px 20px rgba(226,75,74,.2),0 0 0 2px rgba(226,75,74,.3)}
.lop-card.has-alert::after{background:linear-gradient(90deg,#e24b4a,#f87171)}
.lop-title{font-size:16px;font-weight:700;color:#0d2d5e;margin-bottom:4px}
.lop-cap{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:10px;letter-spacing:.04em}
.lop-progress-wrap{margin:10px 0 6px}
.lop-progress-label{display:flex;justify-content:space-between;font-size:11px;color:#8a96a8;margin-bottom:5px}
.lop-progress{height:7px;background:#f0f4fa;border-radius:4px;box-shadow:inset 0 1px 3px rgba(0,0,0,.06)}
.lop-progress-fill{height:100%;border-radius:4px;transition:width .4s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.lop-dates{font-size:11px;color:#8a96a8;margin-top:6px}
.kt-alert{margin-top:10px;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.kt-alert.giua{background:#fffbeb;color:#92400e;border-left:3px solid #f59e0b}
.kt-alert.cuoi{background:#fff1f2;color:#991b1b;border-left:3px solid #e24b4a}
.lop-actions{position:absolute;top:14px;right:14px;display:flex;gap:5px}
.so-hv{font-size:12px;color:#6b7280;margin-top:8px}

/* CHECKBOX STYLE */
.cb{width:16px;height:16px;cursor:pointer;accent-color:#1a50a0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,50,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(10,20,80,.25),0 0 0 1px rgba(255,255,255,.6)}
.modal h3{font-size:16px;font-weight:700;color:#0d2d5e;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #f0f4fa}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:#5a6478;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f4fa}
.hint{background:linear-gradient(135deg,#f0f7ff,#e8f0fb);border-radius:10px;padding:11px 14px;font-size:12px;color:#3b5ea6;margin-top:6px;border-left:3px solid #3a7bd5}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast-item{background:linear-gradient(135deg,#1a2236,#0d2d5e);color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slideIn .25s cubic-bezier(.34,1.56,.64,1);max-width:320px;border:1px solid rgba(255,255,255,.1)}
.toast-item.success{background:linear-gradient(135deg,#0f6e56,#059669)}
.toast-item.error{background:linear-gradient(135deg,#993c1d,#dc2626)}
@keyframes slideIn{from{transform:translateX(40px) scale(.95);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}

/* LOGIN */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0d2d5e 0%,#1a50a0 50%,#2563d4 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(255,255,255,.04);top:-200px;right:-200px}
#login-screen::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.03);bottom:-150px;left:-150px}
.login-card{background:#fff;border-radius:24px;padding:48px 40px;width:420px;max-width:94vw;border:none;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.1);position:relative;z-index:1}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#1a50a0,#2563d4);border-radius:22px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;font-weight:800;margin:0 auto 20px;box-shadow:0 8px 24px rgba(26,80,160,.4)}
.login-title{font-size:22px;font-weight:700;color:#0d2d5e;margin-bottom:6px}
.login-sub{font-size:13px;color:#8a96a8;margin-bottom:28px}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #e4ebf5;border-radius:12px;padding:13px 24px;font-size:14px;font-weight:600;color:#1a2236;cursor:pointer;width:100%;justify-content:center;transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google:hover{border-color:#3a7bd5;box-shadow:0 4px 16px rgba(58,123,213,.18);transform:translateY(-1px)}
.login-error{margin-top:14px;font-size:13px;color:#993c1d;background:#fef2f2;border-radius:10px;padding:10px 14px;display:none;text-align:left;border-left:3px solid #e24b4a}
.login-loading{margin-top:16px;display:none}
.loading-label{font-size:12px;color:#5a6478;margin-bottom:8px;display:flex;justify-content:space-between}
.loading-track{height:6px;background:#f0f4fa;border-radius:3px;overflow:hidden}
.loading-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#1a50a0,#3a7bd5,#60a5fa);background-size:200%;animation:shimmer 1.5s infinite;width:0%;transition:width 2.6s cubic-bezier(.22,.61,.36,1)}
@keyframes shimmer{0%{background-position:100%}100%{background-position:-100%}}
.login-note{margin-top:18px;font-size:11px;color:#a0aab8}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:#8a96a8}

/* TUTORIAL BUBBLE */
#tutorial-bubble{position:fixed;bottom:24px;right:24px;z-index:1500;width:300px;background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(10,30,80,.18),0 0 0 1.5px rgba(26,80,160,.12);overflow:hidden;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
#tutorial-bubble.minimized{width:48px;height:48px;border-radius:50%;overflow:hidden;box-shadow:0 4px 16px rgba(26,80,160,.25)}
.tut-header{background:linear-gradient(135deg,#1a50a0,#2563d4);padding:12px 14px;display:flex;align-items:center;gap:8px}
.tut-header-icon{font-size:18px}
.tut-header-title{font-size:13px;font-weight:600;color:#fff;flex:1}
.tut-header-btns{display:flex;gap:4px}
.tut-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.tut-btn:hover{background:rgba(255,255,255,.35)}
.tut-body{padding:14px 16px}
.tut-step{font-size:12px;color:#8a96a8;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tut-text{font-size:13px;color:#1a2236;line-height:1.6}
.tut-nav{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #f0f4fa}
.tut-dots{display:flex;gap:4px;flex:1}
.tut-dot{width:6px;height:6px;border-radius:50%;background:#e4ebf5;transition:all .2s}
.tut-dot.active{background:#1a50a0;width:18px;border-radius:3px}
.tut-nav-btn{background:none;border:1.5px solid #e4ebf5;border-radius:8px;padding:4px 10px;font-size:12px;color:#5a6478;cursor:pointer;transition:all .15s}
.tut-nav-btn:hover{border-color:#3a7bd5;color:#1a50a0}
.tut-nav-btn:disabled{opacity:.4;cursor:default}
.tut-min-icon{width:48px;height:48px;background:linear-gradient(135deg,#1a50a0,#2563d4);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;position:absolute;inset:0;border-radius:50%}

/* RESPONSIVE */
@media(max-width:800px){
  #sidebar{width:54px}
  .brand-name,.nav-item span,.nav-section,.nav-lop,.user-name,.role-pill,.logout-btn{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .kanban,.lop-grid{grid-template-columns:1fr}
  .form-grid2,.form-grid3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">SM</div>
    <h1 class="login-title">Sprachzentrum Manager</h1>
    <p class="login-sub">Hệ thống quản lý đào tạo trung tâm ngoại ngữ</p>
    <button class="btn-google" id="login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Đăng nhập bằng Google

    <div class="login-error" id="login-error"></div>
    <div class="login-loading" id="login-loading">

      </div>
      <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
    </div>
    <p class="login-note">Chỉ email được cấp phép mới có thể truy cập</p>
  </div>
</div>

      </div>
    </div>
  </div>
</div>
